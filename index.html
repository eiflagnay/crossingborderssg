<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG Checkpoint Monitor (No-Install)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl text-white">
                    <i data-lucide="navigation"></i>
                </div>
                <h1 class="text-xl font-bold">SG Checkpoint Live</h1>
            </div>
            <button onclick="fetchTraffic()" class="p-2 bg-slate-100 hover:bg-slate-200 rounded-full transition-all">
                <i data-lucide="refresh-cw" id="refresh-icon"></i>
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-6">
        <div class="flex p-1 bg-slate-200 rounded-2xl mb-8 w-full max-w-md mx-auto">
            <button onclick="switchTab('woodlands')" id="tab-woodlands" class="flex-1 py-3 rounded-xl text-sm font-semibold bg-white shadow-sm text-blue-600">Woodlands</button>
            <button onclick="switchTab('tuas')" id="tab-tuas" class="flex-1 py-3 rounded-xl text-sm font-semibold text-slate-600">Tuas</button>
        </div>

        <div id="status-card" class="bg-gradient-to-br from-blue-600 to-indigo-700 p-6 rounded-3xl text-white shadow-xl mb-8">
            <p class="text-xs font-bold uppercase tracking-widest opacity-80 mb-2">Est. Crossing Time</p>
            <div class="flex items-end gap-2">
                <span id="time-range" class="text-5xl font-black">--</span>
                <span class="text-xl font-bold opacity-80 pb-1">mins</span>
            </div>
            <p id="checkpoint-label" class="mt-2 text-sm opacity-90">Loading data...</p>
        </div>

        <div id="camera-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>
    </main>

    <script>
        let currentTab = 'woodlands';
        const CAMERA_MAPPING = {
            woodlands: ['2701', '2702', '2705'],
            tuas: ['4703', '4713', '4701']
        };

        async function fetchTraffic() {
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('animate-spin');
            
            try {
                const response = await fetch('https://api.data.gov.sg/v1/transport/traffic-images');
                const data = await response.json();
                const allCameras = data.items[0].cameras;
                renderCameras(allCameras);
                updateEstimates();
            } catch (error) {
                console.error("Failed to fetch data", error);
            } finally {
                setTimeout(() => icon.classList.remove('animate-spin'), 500);
            }
        }

        function renderCameras(allCameras) {
            const grid = document.getElementById('camera-grid');
            grid.innerHTML = '';
            
            const filtered = allCameras.filter(cam => CAMERA_MAPPING[currentTab].includes(cam.camera_id));
            
            filtered.forEach(cam => {
                const card = `
                    <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
                        <img src="${cam.image}" class="w-full aspect-video object-cover" />
                        <div class="p-4 font-bold text-slate-700">Camera ${cam.camera_id}</div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            // Update UI buttons
            document.getElementById('tab-woodlands').className = tab === 'woodlands' ? 'flex-1 py-3 rounded-xl text-sm font-semibold bg-white shadow-sm text-blue-600' : 'flex-1 py-3 rounded-xl text-sm font-semibold text-slate-600';
            document.getElementById('tab-tuas').className = tab === 'tuas' ? 'flex-1 py-3 rounded-xl text-sm font-semibold bg-white shadow-sm text-blue-600' : 'flex-1 py-3 rounded-xl text-sm font-semibold text-slate-600';
            fetchTraffic();
        }

        function updateEstimates() {
            const hour = new Date().getHours();
            const isPeak = (hour >= 7 && hour <= 10) || (hour >= 17 && hour <= 20);
            const range = currentTab === 'woodlands' 
                ? (isPeak ? "60-110" : "20-35") 
                : (isPeak ? "40-75" : "15-25");
            
            document.getElementById('time-range').innerText = range;
            document.getElementById('checkpoint-label').innerText = `Via ${currentTab.charAt(0).toUpperCase() + currentTab.slice(1)} Checkpoint`;
        }

        // Initialize
        fetchTraffic();
        lucide.createIcons();
    </script>
</body>
</html>
